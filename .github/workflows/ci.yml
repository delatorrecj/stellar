name: Stella CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Frontend ──────────────────────────────────────────────
  # Lints and builds the React/Vite frontend to catch type errors
  # and ensure the production bundle compiles cleanly.
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build (TypeScript + Vite)
        run: npm run build
        env:
          VITE_CONTRACT_ID: ${{ vars.VITE_CONTRACT_ID || 'CAZHXCM3UNLT7HJLYHFWBRWAF3PCFN5TR4QCNYDCGCQ6K3ZMU7X7ZSLH' }}
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_RPC_URL: "https://soroban-testnet.stellar.org"

  # ── Job 2: Smart Contract ────────────────────────────────────────
  # Runs all 25 Soroban unit tests and builds the WASM binary to
  # verify the contract compiles for production deployment.
  contract:
    name: Contract (Test + WASM Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Run unit tests (25 tests, T-01 to T-25)
        run: cargo test

      - name: Build WASM binary (release)
        run: cargo build --target wasm32-unknown-unknown --release
