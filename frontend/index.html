<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Primary -->
    <title>Stella — Secure Your Onboarding</title>
    <meta name="description" content="Stella protects job candidates and employers through transparent, on-chain fund management on the Stellar network. Lock onboarding funds, claim milestones, recover balances — all without middlemen." />
    <meta name="keywords" content="Stella, Stellar, Soroban, escrow, onboarding funds, pre-employment, blockchain, DeFi" />
    <meta name="author" content="Stella Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stella-escrow.vercel.app/" />

    <!-- SEO: Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stella — Secure Your Onboarding" />
    <meta property="og:description" content="Lock onboarding funds for your new hire. Candidates claim as they complete milestones. Built on Stellar." />
    <meta property="og:url" content="https://stella-escrow.vercel.app/" />
    <meta property="og:site_name" content="Stella" />
    <meta property="og:image" content="https://stella-escrow.vercel.app/favicon.svg" />
    <meta property="og:locale" content="en_US" />

    <!-- SEO: Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Stella — Secure Your Onboarding" />
    <meta name="twitter:description" content="Pre-employment fund escrow on Stellar. Protecting workers and employers through transparent, on-chain management." />
    <meta name="twitter:image" content="https://stella-escrow.vercel.app/favicon.svg" />

    <!-- Favicon + PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/favicon-32.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D9494" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stella" />

    <!-- Google Fonts: preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data: JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Stella",
      "url": "https://stella-escrow.vercel.app/",
      "description": "Pre-employment escrow on the Stellar network. Protecting workers and employers through transparent, on-chain fund management.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Stella Team"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
